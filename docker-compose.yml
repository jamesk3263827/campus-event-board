version: '3.9'

# ── How to use ────────────────────────────────────────────────────────────────
#
#   1. Copy .env.example to .env and fill in all values (see .env.example).
#   2. Run:  docker compose up --build
#   3. Open: http://localhost:8081  (frontend)
#            http://localhost:3000/health  (Node API health check)
#            http://localhost:8080/actuator/health  (Java service health check)
#   4. Stop: docker compose down
#
# Services start in dependency order:
#   waitlist-service → node-server → frontend
# Each waits for the previous to pass its healthcheck before starting.
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Java Waitlist Microservice ──────────────────────────────────────────────
  waitlist-service:
    build:
      context: ./waitlist-service
      dockerfile: Dockerfile
    container_name: campus-waitlist
    ports:
      - "8080:8080"
    environment:
      # Full Firebase service account JSON as a single-line string.
      # Set this in your .env file (see .env.example).
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      # Must match the INTERNAL_SECRET set on the Node service.
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      # Points back to the Node server using Docker's internal network name.
      # Do NOT use localhost here — containers have separate network namespaces.
      - NODE_BASE_URL=http://node-server:3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # Spring Boot takes longer to start — give it time

  # ── Node.js API Server ──────────────────────────────────────────────────────
  node-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: campus-node
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
      # Points to the Java service using its Docker service name, not localhost.
      - JAVA_SERVICE_URL=http://waitlist-service:8080
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      waitlist-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend (served via nginx) ─────────────────────────────────────────────
  # Uses a pre-built nginx image — no build step needed for static files.
  # The client folder is mounted read-only so changes to HTML/CSS/JS are
  # reflected immediately without rebuilding (just refresh the browser).
  frontend:
    image: nginx:alpine
    container_name: campus-frontend
    ports:
      - "8081:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      node-server:
        condition: service_healthy
