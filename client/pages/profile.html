<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile – Campus Event Board</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <div class="offline-banner" role="alert">
    📵 You're offline — some features may not work
  </div>

  <nav class="navbar">
    <a href="events.html" class="nav-back">← Events</a>
    <div class="navbar-actions">
      <button class="btn-secondary" onclick="logout()">Log out</button>
    </div>
  </nav>

  <div class="page-container">

    <!-- Profile header — avatar + email, filled in by JS -->
    <div class="profile-header">
      <div class="profile-avatar" id="profile-avatar">?</div>
      <div class="profile-info">
        <div class="profile-name" id="profile-name">Loading…</div>
        <div class="profile-email" id="profile-email"></div>
      </div>
    </div>

    <!-- Loading -->
    <div id="profile-loading" class="page-loading">
      <div class="spinner"></div>
      Loading your events…
    </div>

    <!-- Error -->
    <div id="profile-error" class="error-banner" style="display:none;" role="alert"></div>

    <!-- Content (hidden until data loads) -->
    <div id="profile-content" style="display:none;">

      <section class="profile-section">
        <h3>Events I Created</h3>
        <div id="created-list" class="profile-event-list"></div>
      </section>

      <section class="profile-section">
        <h3>Events I'm Going To</h3>
        <div id="going-list" class="profile-event-list"></div>
      </section>

      <section class="profile-section">
        <h3>Waitlisted</h3>
        <div id="waitlisted-list" class="profile-event-list"></div>
      </section>

      <section class="profile-section" style="border-top: 1px solid var(--border); margin-top: 2rem; padding-top: 2rem;">
        <h3 style="color: var(--error, #e53e3e);">Danger Zone</h3>
        <p style="color: var(--text-muted); margin-bottom: 1rem;">
          Deleting your account will remove all your data after a 30-day grace period.
          You can cancel by logging back in within that window.
        </p>
        <button id="delete-account-btn" class="btn-secondary" style="border-color: var(--error, #e53e3e); color: var(--error, #e53e3e);">
          Delete My Account
        </button>
        <div id="delete-account-error" class="error-text" style="display:none; margin-top:0.5rem;"></div>
      </section>

    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="../auth.js"></script>
  <script src="../config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/profile.js"></script>
  <script>requireAuth();</script>
</body>
</html>
