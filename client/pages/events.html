<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Events</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <!-- Offline banner — shown by CSS when body.is-offline -->
  <div class="offline-banner" role="alert">
    📵 You're offline — some features may not work
  </div>

  <nav class="navbar">
    <h1>Campus Event Board</h1>
    <div class="navbar-actions">
      <a href="profile.html" class="btn-secondary">Profile</a>
      <button onclick="logout()" class="btn-secondary">Log out</button>
    </div>
  </nav>

  <div class="page-container">

    <!-- Search & Filter -->
    <div class="filters">
      <input
        type="text"
        id="search-input"
        placeholder="Search events…"
        aria-label="Search events"
        autocomplete="off"
      />
      <select id="category-filter" aria-label="Filter by category">
        <option value="">All categories</option>
        <option value="social">Social</option>
        <option value="academic">Academic</option>
        <option value="sports">Sports</option>
        <option value="arts">Arts</option>
        <option value="other">Other</option>
      </select>
      <a href="create-event.html" class="btn-primary btn-inline">+ Create Event</a>
    </div>

    <!-- Error banner (hidden by default) -->
    <div id="events-error" class="error-banner" style="display:none;" role="alert"></div>

    <!-- Events Grid (loading skeleton shown first) -->
    <div id="events-grid" aria-live="polite" aria-label="Events list">
      <!-- Skeleton cards shown while loading -->
      <div class="skeleton-card">
        <div class="skeleton skeleton-line w-40"></div>
        <div class="skeleton skeleton-line w-80"></div>
        <div class="skeleton skeleton-line w-60"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton skeleton-line w-40"></div>
        <div class="skeleton skeleton-line w-80"></div>
        <div class="skeleton skeleton-line w-60"></div>
      </div>
    </div>

  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="../auth.js"></script>
  <script src="../js/api.js"></script>

  <script>
    requireAuth();

    // ── Debounce search input ─────────────────────────────────────────────────
    let searchTimer = null;
    function debounce(fn, delay) {
      return (...args) => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => fn(...args), delay);
      };
    }

    // ── Load events from Node API ─────────────────────────────────────────────
    async function loadEvents() {
      const search   = document.getElementById('search-input').value.trim();
      const category = document.getElementById('category-filter').value;
      const errorEl  = document.getElementById('events-error');

      errorEl.style.display = 'none';
      errorEl.textContent   = '';

      // Show skeleton while fetching
      document.getElementById('events-grid').innerHTML = `
        <div class="skeleton-card">
          <div class="skeleton skeleton-line w-40"></div>
          <div class="skeleton skeleton-line w-80"></div>
          <div class="skeleton skeleton-line w-60"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton skeleton-line w-40"></div>
          <div class="skeleton skeleton-line w-80"></div>
          <div class="skeleton skeleton-line w-60"></div>
        </div>`;

      try {
        const params = {};
        if (search)   params.search   = search;
        if (category) params.category = category;

        const events = await api.getEvents(params);
        renderEvents(events, search, category);
      } catch (err) {
        document.getElementById('events-grid').innerHTML = '';
        errorEl.textContent   = err.message;
        errorEl.style.display = 'flex';
      }
    }

    // ── Render events or empty state ──────────────────────────────────────────
    function renderEvents(events, search, category) {
      const grid = document.getElementById('events-grid');

      if (!events || events.length === 0) {
        const hasFilter = search || category;
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <span class="empty-state__icon">${hasFilter ? '🔍' : '📅'}</span>
            <p class="empty-state__title">${hasFilter ? 'No matching events' : 'No events yet'}</p>
            <p class="empty-state__body">
              ${hasFilter
                ? 'Try adjusting your search or clearing the category filter.'
                : 'Be the first to create one! Hit "+ Create Event" above.'}
            </p>
            ${hasFilter
              ? '<button class="btn-secondary" onclick="clearFilters()">Clear filters</button>'
              : '<a href="create-event.html" class="btn-primary btn-inline">+ Create Event</a>'}
          </div>`;
        return;
      }

      grid.innerHTML = events.map(e => {
        // Format date nicely if it's a Firestore Timestamp or ISO string
        let dateStr = '';
        if (e.date) {
          const d = e.date?.toDate ? e.date.toDate() : new Date(e.date);
          if (!isNaN(d)) {
            dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          } else {
            dateStr = e.date; // raw string fallback
          }
        }

        const timeStr = e.time || '';
        const when    = [dateStr, timeStr].filter(Boolean).join(' · ');

        return `
          <div class="event-card">
            <span class="badge">${escapeHtml(e.category || 'event')}</span>
            <h3>${escapeHtml(e.title || 'Untitled')}</h3>
            ${when ? `<p>📅 ${escapeHtml(when)}</p>` : ''}
            ${e.location ? `<p>📍 ${escapeHtml(e.location)}</p>` : ''}
            ${e.description ? `<p>${escapeHtml(e.description)}</p>` : ''}
            <a href="event-detail.html?id=${e.id}" class="btn-secondary">View details →</a>
          </div>`;
      }).join('');
    }

    function clearFilters() {
      document.getElementById('search-input').value  = '';
      document.getElementById('category-filter').value = '';
      loadEvents();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Wire up filters ───────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', debounce(loadEvents, 350));
    document.getElementById('category-filter').addEventListener('change', loadEvents);

    // ── Initial load ──────────────────────────────────────────────────────────
    loadEvents();
  </script>

</body>
</html>
