<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <h1>Welcome back</h1>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com">
        <span class="error" id="email-error"></span>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password">
        <span class="error" id="password-error"></span>
      </div>
      <button type="submit" class="btn-primary">Log in</button>
      <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
      <p class="auth-link">
        <a href="#" id="forgot-password-link">Forgot password?</a>
      </p>
      <p class="error" id="general-error"></p>
      <p id="resend-verification" style="display:none; text-align:center;">
        <a href="#" id="resend-link">Resend verification email</a>
      </p>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
