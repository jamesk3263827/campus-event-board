<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <h1>Welcome back</h1>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com">
        <span class="error" id="email-error"></span>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password">
        <span class="error" id="password-error"></span>
      </div>
      <button type="submit" class="btn-primary">Log in</button>
      <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
      <p class="auth-link">
        <a href="#" id="forgot-password-link">Forgot password?</a>
      </p>
      <p class="error" id="general-error"></p>
      <p id="resend-verification" style="display:none; text-align:center;">
        <a href="#" id="resend-link">Resend verification email</a>
      </p>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="auth.js"></script>

  <!--
    After a successful login, fire the welcome email if the user's email is now
    verified and the welcome email hasn't been sent yet.
    This is idempotent — the server checks the welcomeEmailSent flag and only
    sends once, so calling it on every login is safe.
  -->
  <script>
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user || !user.emailVerified) return;

      try {
        const token = await user.getIdToken();
        const base  = (window.APP_CONFIG && window.APP_CONFIG.apiBaseUrl)
                        ? window.APP_CONFIG.apiBaseUrl
                        : 'http://localhost:3000/api';

        // Fire-and-forget — don't await, don't block login redirect
        fetch(`${base}/users/send-welcome`, {
          method:  'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        }).catch(() => { /* silent — this is a best-effort call */ });
      } catch (e) {
        // Never block login flow
      }
    });
  </script>
</body>
</html>
