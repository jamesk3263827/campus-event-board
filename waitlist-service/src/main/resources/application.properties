# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=campus-event-board

# ── Spring Boot Actuator ──────────────────────────────────────────────────────
# Exposes /actuator/health for health checks.
# The Node javaService.js calls this to verify the Java service is reachable.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── CORS (global fallback for any controllers not annotated with @CrossOrigin) ─
# The WaitlistController uses @CrossOrigin directly, so this only affects
# any future controllers added to this service.
# NODE_BASE_URL is set as an environment variable in Render (e.g. https://campus-event-board-node.onrender.com).
# The fallback after the colon is used for local development.
spring.mvc.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,${NODE_BASE_URL:}
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=Content-Type,Authorization
spring.mvc.cors.allow-credentials=true

# ── Logging ───────────────────────────────────────────────────────────────────
# Show INFO logs from your app package, suppress noisy Spring startup lines.
logging.level.com.yourapp=INFO
logging.level.org.springframework.web=WARN
logging.level.com.google.cloud=WARN

# ── Startup banner ────────────────────────────────────────────────────────────
# Optional: suppress the Spring Boot ASCII art banner for cleaner terminal output
# spring.main.banner-mode=off

# ── Inter-service communication ───────────────────────────────────────────────
# INTERNAL_SECRET must match the value set in the Node service environment variables.
# NODE_BASE_URL is the live Render URL of the Node service (set in Render dashboard).
# Fallback values are used for local development only.
node.internal.secret=${INTERNAL_SECRET:changeme-set-this-in-render}
node.base.url=${NODE_BASE_URL:http://localhost:3000}
