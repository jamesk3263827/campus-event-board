server {
    listen 80;
    server_name localhost;

    # Root directory matches the volume mount in docker-compose.yml
    root /usr/share/nginx/html;
    index index.html;

    # Serve files directly; fall back to index.html for any path not found.
    # This handles deep-linked pages gracefully without a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (CSS, JS, images) for 1 hour in the browser.
    # During development with docker compose, a hard refresh (Cmd+Shift+R)
    # bypasses the cache if you need to see JS/CSS changes immediately.
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Disable access log for favicon to keep the nginx log clean
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
